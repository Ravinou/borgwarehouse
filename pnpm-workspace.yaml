packages:
  - .

# Supply-chain protection: pnpm refuses to install package versions published
# less than 24h ago (defends against freshly compromised releases). Set
# explicitly so the behavior is consistent across pnpm versions (pnpm < 11
# defaulted to 0). See https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 1440

# These dependencies have build scripts that pnpm runs at install time.
# better-sqlite3, sharp and unrs-resolver are native modules (C++ bindings)
# that require compilation; esbuild downloads its platform binary.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
  - unrs-resolver
